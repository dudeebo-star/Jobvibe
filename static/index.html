<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobVibe — Setup</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <div class="shell">
    <header class="brand">
      <div class="brand-mark">Jv</div>
      <div>
        <h1>JobVibe</h1>
        <p>AI interviews powered by DeepSeek</p>
      </div>
    </header>

    <div class="steps">
      <div class="step active">1. Upload</div>
      <div class="step">2. Interview</div>
      <div class="step">3. Vision</div>
      <div class="step">4. Report</div>
    </div>

    <form id="form" class="card">
      <h2>Start a new session</h2>

      <label class="field">
        <span>Your name</span>
        <input type="text" id="name" required placeholder="Alex Morgan" />
      </label>

      <label class="field">
        <span>Role title</span>
        <input type="text" id="role" required placeholder="Senior Software Engineer" />
      </label>

      <label class="field">
        <span>Job description</span>
        <textarea id="job" required placeholder="Paste the full job posting…"></textarea>
      </label>

      <label class="field">
        <span>Resume (PDF)</span>
        <input type="file" id="pdf" accept=".pdf" required />
      </label>

      <button type="submit" class="btn btn-primary" id="go">Analyse &amp; continue</button>
      <p class="hint" id="msg"></p>
    </form>

    <section id="insights" class="card" hidden>
      <h2>Resume match</h2>
      <div id="insight-body"></div>
      <button type="button" class="btn btn-primary" id="enter">Enter interview room</button>
    </section>
  </div>

  <script src="/static/js/setup.js"></script>
</body>
</html>
