<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobVibe — Report</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <div class="shell">
    <header class="brand">
      <div class="brand-mark">Jv</div>
      <div>
        <h1>Your report</h1>
        <p id="rec-badge" class="badge-rec"></p>
      </div>
    </header>

    <section class="card">
      <div class="score-grid" id="scores"></div>
    </section>

    <section class="card">
      <h2>Confidence over time</h2>
      <div class="chart-box">
        <canvas id="chart"></canvas>
      </div>
    </section>

    <section class="card">
      <h2>Summary</h2>
      <p id="summary"></p>
      <h3>Strengths</h3>
      <ul class="clean" id="strengths"></ul>
      <h3>To improve</h3>
      <ul class="clean" id="improve"></ul>
    </section>

    <section class="card">
      <a id="pdf" class="btn btn-primary" style="text-decoration:none;color:white">Download PDF</a>
      <button type="button" class="btn btn-ghost" style="margin-left:0.5rem" onclick="location.href='/'">New interview</button>
    </section>
  </div>
  <script src="/static/js/report.js"></script>
</body>
</html>
